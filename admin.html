const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function fmtDate(iso) {
  return new Date(iso).toLocaleString(undefined, {
    weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'
  });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = iso.toDate ? iso.toDate() : new Date(iso);
  return d.toLocaleString(undefined, {
    day:'numeric', month:'short', hour:'numeric', minute:'2-digit'
  });
}
function timeAgo(iso) {
  if (!iso) return '—';
  const d = iso.toDate ? iso.toDate() : new Date(iso);
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${Math.floor(diff/86400000)}d ago`;
}

let toastTimer;
function toast(msg, bad=false) {
  const t = $("toast");
  t.textContent = msg;
  t.className = 'toast show' + (bad?' bad':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

const NAME_ALIASES = {
  'Korea Republic':'South Korea','United States':'USA',
  'Türkiye':'Turkey','Bosnia and Herzegovina':'Bosnia & Herzegovina',
  'Czechia':'Czech Republic'
};
function normalizeName(n) { return NAME_ALIASES[n] || n; }
function migrateResults(raw) {
  const out = {};
  Object.entries(raw).forEach(([id, val]) => {
    if (!val) return;
    if (val === 'H' || val === 'A' || val === 'D') {
      const f = FIXTURES.find(x => x.id === id);
      if (!f) return;
      out[id] = val === 'H' ? f.home : val === 'A' ? f.away : 'Draw';
    } else {
      out[id] = normalizeName(val);
    }
  });
  return out;
}

function computeGroupStandings() {
  const standings = {};
  GROUP_ORDER.forEach(g => {
    standings[g] = {};
    FIXTURES.filter(f=>f.group===g).forEach(f=>{
      if(!standings[g][f.home]) standings[g][f.home]={pts:0,w:0,d:0,l:0,played:0};
      if(!standings[g][f.away]) standings[g][f.away]={pts:0,w:0,d:0,l:0,played:0};
    });
  });
  Object.entries(S.results).forEach(([id,result])=>{
    const f=FIXTURES.find(x=>x.id===id); if(!f) return;
    const g=f.group;
    standings[g][f.home].played++; standings[g][f.away].played++;
    if(result==='Draw'){
      standings[g][f.home].pts+=1; standings[g][f.home].d++;
      standings[g][f.away].pts+=1; standings[g][f.away].d++;
    } else if(result===normalizeName(f.home)){
      standings[g][f.home].pts+=3; standings[g][f.home].w++;
      standings[g][f.away].l++;
    } else if(result===normalizeName(f.away)){
      standings[g][f.away].pts+=3; standings[g][f.away].w++;
      standings[g][f.home].l++;
    }
  });
  const sorted = {};
  GROUP_ORDER.forEach(g=>{
    sorted[g]=Object.entries(standings[g])
      .map(([team,stats])=>({team,...stats}))
      .sort((a,b)=>b.pts-a.pts||a.team.localeCompare(b.team));
  });
  return sorted;
}

function getTeamForSlot(slot, standings) {
  const m1 = slot.match(/^([12])([A-L])$/);
  if (m1) {
    const pos = parseInt(m1[1]) - 1, grp = m1[2];
    return standings[grp]?.[pos]?.team || null;
  }
  const m3 = slot.match(/^3rd\(([A-L/]+)\)$/);
  if (m3) {
    const thirds = m3[1].split('/').map(g => standings[g]?.[2]).filter(Boolean);
    thirds.sort((a,b) => b.pts - a.pts || a.team.localeCompare(b.team));
    return thirds[0]?.team || null;
  }
  return null;
}

function getKoTeams(matchId, allPicks={}) {
  const match = BRACKET.find(m=>m.id===matchId);
  if (!match) return null;
  if (match.round === 'R32') {
    const t = S.koR32Teams[matchId];
    if (t?.home && t?.away) return {home:t.home, away:t.away};
    return null;
  }
  if (match.feedsLosers) {
    const teams = match.feedsLosers.map(feedId => {
      const sfTeams = getKoTeams(feedId, allPicks);
      if (!sfTeams) return null;
      const sfWinner = S.koResults[feedId] || allPicks[feedId];
      if (!sfWinner) return null;
      return sfWinner === sfTeams.home ? sfTeams.away : sfTeams.home;
    });
    return teams.some(t=>!t) ? null : {home:teams[0], away:teams[1]};
  }
  const teams = match.feeds.map(feedId => S.koResults[feedId] || null);
  return teams.some(t=>!t) ? null : {home:teams[0], away:teams[1]};
}

      const d = snap.data();
      S.entriesClosed   = d.entries_closed    || false;
      S.koEntriesClosed = d.ko_entries_closed || false;
      S.contestName     = d.contest_name      || S.contestName;
      S.results             = migrateResults(d.results || {});
      S.koR32Teams          = d.ko_r32_teams         || {};
      S.koResults           = d.ko_results           || {};
      S.koThirdQualifiers   = d.ko_third_qualifiers  || [];
      S.group3rdOverride    = d.group_3rd_override   || {};

      // ── One-time migration: old setDoc+merge stored flat dotted keys
      //    e.g. {"results.A1": "Mexico"} instead of {results: {A1: "Mexico"}}
      let needsMigration = false;
      Object.entries(d).forEach(([k, v]) => {
        if (k.startsWith('results.')) {
          const id = k.slice('results.'.length);
          S.results[id] = S.results[id] || v;
          needsMigration = true;
        } else if (k.startsWith('ko_results.')) {
          const id = k.slice('ko_results.'.length);
          S.koResults[id] = S.koResults[id] || v;
          needsMigration = true;
        } else if (k.startsWith('ko_r32_teams.')) {
          const id = k.slice('ko_r32_teams.'.length);
          S.koR32Teams[id] = S.koR32Teams[id] || v;
          needsMigration = true;
        }
      });
      if (needsMigration) {
        console.log("Migrating flat dotted-key results to nested format…");
        await writeSettingsDoc();
        console.log("Migration done.");
      }
    }
  } catch(e) { console.error("Boot error:", e); }
}

/* ── Knockout Admin ──────────────────────────────────────────── */
function renderKnockoutAdmin() {
  const standings = computeGroupStandings();

  // Standings grid
  let stdHtml = `<div class="standings-grid">`;
  GROUP_ORDER.forEach(g=>{
    stdHtml += `<div class="standings-group"><div class="standings-title">Group ${g}</div>`;
    standings[g].forEach((t,i)=>{
      const badge = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      stdHtml += `<div class="standings-row"><span class="standings-rank">${badge}</span><span class="standings-name">${flag(t.team)} ${esc(t.team)}</span><span class="standings-pts">${t.pts}pt</span></div>`;
    });
    stdHtml += `</div>`;
  });
  stdHtml += `</div>`;

  // ── 3rd-place qualifier selector ─────────────────────────────
  // Build group→teams map for override dropdown
  const groupTeams = {};
  FIXTURES.forEach(f => {
    if (!f.group) return;
    if (!groupTeams[f.group]) groupTeams[f.group] = new Set();
    groupTeams[f.group].add(f.home);
    groupTeams[f.group].add(f.away);
  });

  const thirds = GROUP_ORDER.map(g => {
    const override = S.group3rdOverride?.[g];
    let t;
    if (override) {
      t = (standings[g] || []).find(x => x.team === override)
        || {team: override, pts:0, w:0, d:0, l:0, played:0};
    } else {
      t = standings[g]?.[2] || {team:'—', pts:0, w:0, d:0, l:0, played:0};
    }
    return { group: g, team: t.team, pts: t.pts??0, w: t.w??0, d: t.d??0, l: t.l??0, played: t.played??0, overridden: !!override };
  });
  const sel = new Set(S.koThirdQualifiers);
  const tooMany = sel.size > 8;

  let thirdHtml = `<div class="card third-sel-card">
    <div class="third-sel-hdr">
      <span>🥉 Select 8 Best Third-Place Teams</span>
      <span class="third-count ${sel.size===8?'ok':sel.size>8?'over':''}">${sel.size}/8 selected</span>
    </div>
    <p style="font-size:11px;color:var(--muted);margin:0 0 12px">Tap chip to include/exclude. Use dropdown to fix GD tiebreakers.</p>
    <div class="third-grid">`;

  thirds.forEach(({group, team, pts, w, d, l, played, overridden}) => {
    const on = sel.has(group);
    const allTeams = [...(groupTeams[group] || [])].sort();
    const opts = allTeams.map(t => `<option value="${esc(t)}" ${t===team?'selected':''}>${esc(t)}</option>`).join('');
    thirdHtml += `<div class="third-chip ${on?'on':''} ${!played?'no-data':''}" onclick="toggleThird('${group}')">
      <div class="third-chip-grp">Grp ${group}${overridden?' ✏️':''}</div>
      <div class="third-chip-team">${flag(team)} ${esc(team)}</div>
      <div class="third-chip-pts">${played ? `${pts}pt · ${w}W ${d}D ${l}L` : 'No results'}</div>

        <option value="">auto (${esc(standings[group]?.[2]?.team||'?')})</option>
        ${opts}
      </select>
    </div>`;
  });

  thirdHtml += `</div>`;
  if (sel.size === 8) {
    thirdHtml += `<button class="btn" style="margin-top:14px;width:100%" onclick="saveThirdQualifiers()">✓ Save Selection</button>`;
  } else {
    thirdHtml += `<p style="font-size:12px;color:var(--${sel.size>8?'red':'muted'});margin:12px 0 0;text-align:center">${sel.size>8?'Too many selected — remove '+(sel.size-8)+' team(s)':'Select exactly 8 teams to continue'}</p>`;
  }
  thirdHtml += `</div>`;

  // R32 setup
  let r32Html = "";
  BRACKET.filter(m=>m.round==='R32').forEach(m=>{
    const saved = S.koR32Teams[m.id] || {};
    const suggestTeam = slot => {
      const match = slot.match(/^([12])([A-L])$/);
      if (match) { const pos=parseInt(match[1])-1, grp=match[2]; return standings[grp]?.[pos]?.team||''; }

    };
    const sug1=suggestTeam(m.slot1), sug2=suggestTeam(m.slot2);
    const home=saved.home||'', away=saved.away||'', isSet=home&&away;
    const kr=S.koResults[m.id]||'';
    r32Html += `<div class="card admin-match">
      <div class="admin-teams" style="color:var(--amber);font-size:12px">

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <label style="font-size:10px">Team 1 (${esc(m.slot1)})</label>

        </div>

          <label style="font-size:10px">Team 2 (${esc(m.slot2)})</label>

        <button class="res-btn" onclick="saveR32Teams('${m.id}')">💾 Save</button>
        ${isSet?`<button class="res-btn${kr===home?' sel':''}" onclick="setKoResult('${m.id}','${home}')">${flag(home)} ${esc(home)} wins</button>
        <button class="res-btn${kr===away?' sel':''}" onclick="setKoResult('${m.id}','${away}')">${flag(away)} ${esc(away)} wins</button>`:''}
        ${kr?`<button class="res-btn clear-btn" onclick="setKoResult('${m.id}','')">✕ Clear</button>`:''}
      </div>
    </div>`;
  });

  // Higher rounds
  let higherHtml = "";
  KO_ROUND_ORDER.slice(1).forEach(round=>{
    const matches = BRACKET.filter(m=>m.round===round);
    if (!matches.length) return;
    higherHtml += `<div class="group"><div class="ghead"><span class="gbadge ko-badge">${KO_ROUND_LABELS[round]}</span></div>`;
    matches.forEach(match=>{
      const teams = getKoTeams(match.id);
      const kr = S.koResults[match.id] || '';
      if (!teams) {
        higherHtml += `<div class="card admin-match"><div class="admin-teams" style="color:var(--muted)">${match.id} · TBD vs TBD</div><div class="admin-date">${fmtDate(match.kickoff)} · ${match.venue||''}</div></div>`;
        return;
      }
      higherHtml += `<div class="card admin-match">
        <div class="admin-teams">${flag(teams.home)} ${esc(teams.home)} <span class="vs">v</span> ${esc(teams.away)} ${flag(teams.away)}</div>
        <div class="admin-date">${fmtDate(match.kickoff)} · ${match.venue||''}${kr?` · <b style="color:var(--grass)">Winner: ${esc(kr)}</b>`:''}</div>
        <div class="admin-btns">
          <button class="res-btn${kr===teams.home?' sel':''}" onclick="setKoResult('${match.id}','${teams.home}')">${flag(teams.home)} ${esc(teams.home)}</button>
          <button class="res-btn${kr===teams.away?' sel':''}" onclick="setKoResult('${match.id}','${teams.away}')">${flag(teams.away)} ${esc(teams.away)}</button>
          ${kr?`<button class="res-btn clear-btn" onclick="setKoResult('${match.id}','')">✕</button>`:''}
        </div>
      </div>`;
    });
    higherHtml += `</div>`;
  });

  const allTeams = [...new Set(FIXTURES.flatMap(f=>[f.home,f.away]))].sort();

  $("section-knockout").innerHTML = `
    <datalist id="team-list">${allTeams.map(t=>`<option value="${t}">`).join("")}</datalist>
    <div class="settings-form">
      <h3>📊 Group Standings</h3>${stdHtml}
    </div>
    <div class="settings-form">
      <h3>🥉 Best Third-Place Teams</h3>
      ${thirdHtml}
    </div>

  `;

/* ── Players ─────────────────────────────────────────────────── */
async function renderPlayers() {
  $("section-players").innerHTML = `<div class="empty"><span class="spin"></span> Loading players…</div>`;
  try {
    const [playersSnap, predsSnap] = await Promise.all([
      getDocs(collection(db,'players')),
      getDocs(collection(db,'predictions'))
    ]);

    const predMap = {};
    predsSnap.forEach(d=>{
      const p = d.data();
      predMap[d.id] = {
        updated: p.updated || null,
        pickCount: Object.keys(p.picks||{}).length
      };
    });

    const players = [];
    playersSnap.forEach(d => players.push({...d.data(), phone: d.id}));
    players.sort((a,b)=>{
      const au = predMap[a.phone]?.updated;
      const bu = predMap[b.phone]?.updated;
      if(!au && !bu) return a.name.localeCompare(b.name);
      if(!au) return 1; if(!bu) return -1;
      const at = au.toDate ? au.toDate().getTime() : new Date(au).getTime();
      const bt = bu.toDate ? bu.toDate().getTime() : new Date(bu).getTime();
      return bt - at;
    });

    if (!players.length) {
      $("section-players").innerHTML = `<div class="empty">No players have joined yet.</div>`;
      return;
    }

    const total = players.length;
    const paid  = players.filter(p => p.paid).length;

    let rows = "";
    players.forEach((p,i)=>{
      const pred = predMap[p.phone];
      const pickCount  = pred?.pickCount ?? 0;
      const lastEdit   = pred?.updated ? timeAgo(pred.updated)    : '—';
      const lastEditFull = pred?.updated ? fmtDateShort(pred.updated) : '';
      const joined     = p.joined ? fmtDateShort(p.joined) : '—';
      const maskedPhone = p.phone ? `${p.phone.slice(0,-4).replace(/\d/g,'·')}${p.phone.slice(-4)}` : '—';
      const isPaid     = !!p.paid;

      const joinedTs = p.joined ? new Date(p.joined).getTime() : 0;
      const editedTs = pred?.updated ? new Date(pred.updated).getTime() : 0;
      rows += `<tr class="${pickCount == 104 ? 'complete' : ''} ${isPaid ? 'paid' : 'unpaid'}" id="pr-${p.phone}">
        <td class="pr-rank" data-val="${i+1}">${i+1}</td>
        <td class="pr-name" data-val="${esc(p.name||'?').toLowerCase()}">${esc(p.name||'?')}</td>
        <td class="pr-phone" data-val="${esc(maskedPhone)}">${esc(maskedPhone)}</td>
        <td class="pr-picks" data-val="${pickCount}"><b>${pickCount}</b></td>
        <td class="pr-edit" data-val="${editedTs}" title="${lastEditFull}">${lastEdit}</td>
        <td class="pr-joined" data-val="${joinedTs}">${joined}</td>
        <td class="pr-paid" data-val="${isPaid?1:0}">
          <button class="res-btn${isPaid?' paid-btn':' unpaid-btn'}"
            onclick="togglePaid('${p.phone}',${!isPaid})">
            ${isPaid ? '✓ Paid' : 'Unpaid'}
          </button>
        </td>
        <td class="pr-del">
          <button class="res-btn clear-btn" onclick="deletePlayer('${p.phone}','${esc(p.name||'')}')">🗑</button>
        </td>
      </tr>`;
    });
    $("section-players").innerHTML = `
      <div class="players-summary">
        <span>${total} joined</span>
        <span class="paid-count">💰 ${paid} paid</span>
        <span>✅ ${players.filter(p => predMap[p.phone]?.pickCount === 104).length} completed</span>
        <button class="res-btn" onclick="renderPlayers()" style="margin-left:auto">↻ Refresh</button>
      </div>
      <div class="card" style="overflow-x:auto;padding:0">
        <table class="player-table" id="player-table">
          <thead><tr>
            <th class="sortable" data-col="0" onclick="sortPlayerTable(0)"># <span class="sort-icon">↕</span></th>
            <th class="sortable" data-col="1" onclick="sortPlayerTable(1)">Name <span class="sort-icon">↕</span></th>
            <th>Phone</th>
            <th class="sortable" data-col="3" onclick="sortPlayerTable(3)">Picks <span class="sort-icon">↕</span></th>
            <th class="sortable" data-col="4" onclick="sortPlayerTable(4)">Last edited <span class="sort-icon">↕</span></th>
            <th class="sortable" data-col="5" onclick="sortPlayerTable(5)">Joined <span class="sort-icon">↕</span></th>
            <th class="sortable" data-col="6" onclick="sortPlayerTable(6)">Payment <span class="sort-icon">↕</span></th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    $("section-players").innerHTML = `<div class="empty">Failed to load players.</div>`;
    console.error(e);
  }
}

let _sortCol = -1, _sortAsc = true;
window.sortPlayerTable = function(col) {
  const table = document.getElementById('player-table');
  if (!table) return;
  if (_sortCol === col) { _sortAsc = !_sortAsc; } else { _sortCol = col; _sortAsc = true; }
  const tbody = table.querySelector('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const av = a.querySelectorAll('td')[col]?.dataset.val || '';
    const bv = b.querySelectorAll('td')[col]?.dataset.val || '';
    const an = parseFloat(av), bn = parseFloat(bv);
    const cmp = isNaN(an) || isNaN(bn) ? av.localeCompare(bv) : an - bn;
    return _sortAsc ? cmp : -cmp;
  });
  rows.forEach(r => tbody.appendChild(r));
  // Update header icons
  table.querySelectorAll('th.sortable').forEach(th => {
    const icon = th.querySelector('.sort-icon');
    if (!icon) return;
    const c = parseInt(th.dataset.col);
    icon.textContent = c === _sortCol ? (_sortAsc ? '↑' : '↓') : '↕';
    th.classList.toggle('sort-active', c === _sortCol);
  });
};

/* ── Admin Leaderboard ───────────────────────────────────────── */
const WIN_POINTS  = 3;
const DRAW_POINTS = 1;
const KO_POINTS   = 6;

function adminMigratePick(matchId, pick) {
  if (!pick) return null;
  if (pick === 'H') { const f = FIXTURES.find(x=>x.id===matchId); return f ? normalizeName(f.home) : null; }
  if (pick === 'A') { const f = FIXTURES.find(x=>x.id===matchId); return f ? normalizeName(f.away) : null; }
  if (pick === 'D') return 'Draw';
  return normalizeName(pick);
}

async function refreshLeaderboard() {
  const el = $("section-leaderboard");
  if (!el) return;
  // Only refresh if leaderboard tab is visible
  if (S.adminTab !== 'leaderboard') return;
  el.innerHTML = `<div class="empty"><span class="spin"></span> Calculating…</div>`;
  try {
    const [predsSnap, playersSnap] = await Promise.all([
      getDocs(collection(db,'predictions')),
      getDocs(collection(db,'players'))
    ]);
    // Build predictions lookup keyed by doc ID
    const predsByPhone = {};
    predsSnap.forEach(s => { predsByPhone[s.id] = s.data(); });

    // All players appear on admin leaderboard (paid badge shown)
    const rows = [];
    playersSnap.forEach(d => {
      const phone = d.id;
      const name = d.data().name || phone;
      const isPaid = !!d.data().paid;
      const predData = predsByPhone[phone]
        || Object.values(predsByPhone).find(p => p.phone === phone)
        || {};
      const picks = predData.picks || {};
      let pts=0, correct=0, predicted=0;
      Object.entries(picks).forEach(([id, rawPick]) => {
        const pick = adminMigratePick(id, rawPick);
        if (!pick) return;
        predicted++;
        const r = S.results[id];
        if (r && pick === r) { correct++; pts += (r==='Draw' ? DRAW_POINTS : WIN_POINTS); }
        const kr = S.koResults[id];
        if (kr && pick === kr) { correct++; pts += KO_POINTS; }
      });
      rows.push({name, phone, pts, correct, predicted, isPaid});
    });

    rows.sort((a,b) => b.pts - a.pts || b.correct - a.correct);

    if (!rows.length) {
      el.innerHTML = `<div class="empty">No players yet.</div>`;
      return;
    }

    const paidCount = rows.filter(r => r.isPaid).length;
    const totalMatches = Object.keys(S.results).length + Object.keys(S.koResults).length;
    let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${totalMatches} result${totalMatches===1?'':'s'} entered · ${rows.length} players (💰 ${paidCount} paid)</div>`;
    html += `<div class="lb-table-wrap"><table class="lb-table"><thead><tr><th>#</th><th>Player</th><th>Pts</th><th>✓</th></tr></thead><tbody>`;
    rows.forEach((r,i) => {
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const paidBadge = r.isPaid ? `<span style="font-size:9px;font-weight:700;background:linear-gradient(135deg,#ffd700,#ffa500);color:#2a1a00;padding:1px 5px;border-radius:10px;margin-left:4px;vertical-align:middle">PAID</span>` : '';
      html += `<tr${r.isPaid ? '' : ' style="opacity:.55"'}>
        <td style="color:var(--muted);width:28px">${medal||i+1}</td>
        <td>${esc(r.name)}${paidBadge}<br><span style="font-size:10px;color:var(--muted)">${esc(r.phone)}</span></td>
        <td style="font-weight:700;color:var(--amber)">${r.pts}</td>
        <td style="font-size:12px;color:var(--muted)">${r.correct}/${r.predicted}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty">Failed to load leaderboard.</div>`;
    console.error(e);
  }
}

/* ── Settings ────────────────────────────────────────────────── */
function renderEntryToggles() {
  const grpBtn = $("toggle-group-entries");
  const koBtn  = $("toggle-ko-entries");
  if (grpBtn) {
    grpBtn.textContent = S.entriesClosed   ? "🔓 Open Group Entries"    : "🔒 Close Group Entries";
    grpBtn.className   = S.entriesClosed   ? "btn ghost toggle-open"    : "btn toggle-close";
  }
  if (koBtn) {
    koBtn.textContent  = S.koEntriesClosed ? "🔓 Open KO Entries"       : "🔒 Close KO Entries";
    koBtn.className    = S.koEntriesClosed ? "btn ghost toggle-open"    : "btn toggle-close";
  }
}

window.toggleGroupEntries = async function() {
  const next = !S.entriesClosed;
  try {
    await setDoc(doc(db,'settings','main'), {entries_closed: next}, {merge:true});
    S.entriesClosed = next;
    renderEntryToggles();
    toast(next ? "Group entries closed 🔒" : "Group entries open 🔓");
  } catch(e){ toast("Save failed",true); console.error(e); }
};

window.toggleKoEntries = async function() {
  const next = !S.koEntriesClosed;
  try {
    await setDoc(doc(db,'settings','main'), {ko_entries_closed: next}, {merge:true});
    S.koEntriesClosed = next;
    renderEntryToggles();
    toast(next ? "KO entries closed 🔒" : "KO entries open 🔓");
  } catch(e){ toast("Save failed",true); console.error(e); }
};

window.saveSettings = async function() {
  const name = $("admin-contest-name").value.trim();
  try {
    await setDoc(doc(db,'settings','main'), {contest_name: name || S.contestName}, {merge:true});
    S.contestName = name || S.contestName;
    toast("Settings saved ✓");
  } catch(e){ toast("Save failed",true); console.error(e); }
};

/* ── Clear results (keep players/leaderboard) ────────────────── */
window.clearAllResults = async function() {
  if (!confirm("Clear ALL results, R32 teams, and KO results?\n\nPlayer records and leaderboard data are NOT deleted.")) return;
  S.results = {}; S.koR32Teams = {}; S.koResults = {}; S.koThirdQualifiers = [];
  try {
    await writeSettingsDoc();
    toast("Results cleared ✓");
    switchTab(S.adminTab);
  } catch(e) { toast("Failed", true); console.error(e); }
};

/* ── Auto-fill random group results (testing only) ──────────── */
window.autoFillGroupResults = async function() {
  if (!confirm("Auto-fill ALL 72 group matches with random results?\n(For testing only)")) return;
  FIXTURES.forEach(f => {
    const outcomes = [f.home, 'Draw', f.away];
    S.results[f.id] = outcomes[Math.floor(Math.random()*3)];
  });
  try {
    await writeSettingsDoc();
    toast("72 results filled ✓");
    renderGroupResults();
    refreshLeaderboard();
  } catch(e) { toast("Failed", true); console.error(e); }
};

/* ── Wire ────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  $("admin-pw")?.addEventListener("keydown", e => { if(e.key==="Enter") adminLogin(); });
  // Auto-login if session is still active
  if (sessionStorage.getItem('adminAuth') === ADMIN_PASSWORD) {
    showPanel();
  } else {
    $("admin-pw")?.focus();
  }
});
</script>

<style>
:root{
  --bg:#0a120d;--panel:#11201a;--panel2:#182b22;--line:#273b30;
  --ink:#eef4ee;--muted:#90a89a;--amber:#ffc233;--grass:#33c06b;
  --grass-d:#1d7a43;--red:#ef5b5b;--shadow:0 18px 40px -22px rgba(0,0,0,.8);
}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:'Sora',system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(900px 500px at 80% -10%,rgba(255,194,51,.08),transparent 60%),
    radial-gradient(900px 600px at -10% 10%,rgba(51,192,107,.10),transparent 55%),var(--bg);
  min-height:100vh;-webkit-font-smoothing:antialiased;}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 60px}.hidden{display:none!important}

/* Header */
header{padding:24px 0 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:52px;height:52px;border-radius:50%;object-fit:contain;background:#fff;padding:3px}
.hdr-title{font-family:'Anton';font-weight:400;font-size:22px;letter-spacing:.03em;text-transform:uppercase}
.hdr-sub{font-size:11px;color:var(--amber);font-weight:600;letter-spacing:.14em;text-transform:uppercase}

/* Cards */
.card{background:linear-gradient(180deg,var(--panel),#0e1a14);border:1px solid var(--line);
  border-radius:18px;box-shadow:var(--shadow)}

/* Auth */
label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
input[type=text],input[type=tel],input[type=password],input[type=datetime-local]{
  width:100%;background:#0b1510;border:1px solid var(--line);color:var(--ink);
  border-radius:11px;padding:13px 14px;font:600 15px 'Sora';outline:none;margin-bottom:14px}
input:focus{border-color:var(--grass);box-shadow:0 0 0 3px rgba(51,192,107,.18)}
.btn{appearance:none;border:0;cursor:pointer;border-radius:11px;font:700 15px 'Sora';
  padding:13px 18px;color:#08130c;background:linear-gradient(180deg,#ffd152,var(--amber));transition:.12s}
.btn:hover{filter:brightness(1.05)}.btn:active{transform:translateY(1px)}
.btn.block{width:100%}.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.err{color:var(--red);font-size:13px;margin-top:6px;min-height:18px}

/* Tabs */
.admin-tabs{display:flex;gap:8px;margin:20px 0}
.admin-tab{flex:1;text-align:center;padding:10px;border-radius:11px;border:1px solid var(--line);
  background:transparent;color:var(--muted);font:700 13px 'Sora';cursor:pointer}
.admin-tab.on{background:var(--panel2);color:var(--ink);border-color:var(--grass)}

/* Matches */
.group{margin:20px 0}
.ghead{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
.gbadge{font-family:'Anton';font-size:13px;letter-spacing:.05em;background:var(--grass-d);
  color:#eafff1;padding:4px 10px;border-radius:7px}
.ko-badge{background:linear-gradient(90deg,#7c3aed,#5b21b6)!important;color:#f0e8ff!important}
.vs{color:var(--muted);font-size:11px}
.admin-match{padding:12px 14px;margin:9px 0}
.admin-teams{font-weight:700;font-size:14px;margin-bottom:4px}
.admin-date{font-size:11px;color:var(--muted);margin-bottom:10px}
.admin-btns{display:flex;gap:6px;flex-wrap:wrap}
.res-btn{background:#0b1510;border:1px solid var(--line);color:var(--muted);border-radius:9px;
  padding:8px 14px;font:700 12px 'Sora';cursor:pointer;transition:.12s}
.res-btn:hover{border-color:var(--grass);color:var(--ink)}
.res-btn.sel{background:linear-gradient(180deg,#2ee06f,#1d9c4f);color:#06140b;border-color:#2ee06f}
.res-btn.clear-btn{color:var(--red);border-color:rgba(239,91,91,.3)}

/* Settings form */
.settings-form{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:20px;margin-bottom:20px}
.settings-form h3{font:700 14px 'Sora';letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin:0 0 14px}
.entry-toggles{border-top:1px solid var(--line);padding-top:16px}
.entry-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.toggle-close{background:linear-gradient(180deg,#ef7b7b,var(--red))!important;color:#fff!important;font-size:13px!important;padding:10px 16px!important}
.toggle-open{font-size:13px!important;padding:10px 16px!important;color:var(--grass)!important;border-color:var(--grass)!important}

/* Standings */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.standings-group{background:#0b1510;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.standings-title{font-family:'Anton';font-size:13px;color:var(--amber);margin-bottom:8px;letter-spacing:.06em}
.standings-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;
  border-bottom:1px solid rgba(39,59,48,.4)}
.standings-row:last-child{border-bottom:0}
.standings-rank{width:18px;font-size:13px}
.standings-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.standings-pts{font-weight:700;color:var(--amber);font-size:10px}

/* Players table */
.player-table{width:100%;border-collapse:collapse;font-size:13px}
.player-table th{font:700 10px 'Sora';letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  padding:10px 14px;border-bottom:1px solid var(--line);text-align:left}
.player-table th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.player-table th.sortable:hover{color:var(--ink)}
.player-table th.sort-active{color:var(--amber)}
.sort-icon{opacity:.5;font-style:normal;margin-left:3px}
.player-table td{padding:11px 14px;border-bottom:1px solid rgba(39,59,48,.4)}
.player-table tr:last-child td{border-bottom:0}
.player-table tr:hover td{background:rgba(255,194,51,.04)}
.pr-rank{color:var(--muted);font-family:'Anton';font-size:15px;width:36px}
.complete .pr-name{color:var(--grass)}
.unpaid .pr-rank{color:var(--red)}
.paid .pr-rank{color:var(--grass)}
.pr-name{font-weight:700}
.pr-phone{font-size:11px;color:var(--muted);font-family:monospace}
.pr-picks b{color:var(--amber)}
.pr-edit{color:var(--grass);font-size:12px}
.pr-joined{font-size:11px;color:var(--muted)}
.pr-paid,.pr-del{white-space:nowrap}
.paid-btn{color:#06140b!important;background:linear-gradient(180deg,#2ee06f,#1d9c4f)!important;border-color:#2ee06f!important}
.unpaid-btn{color:var(--amber)!important;border-color:rgba(255,194,51,.4)!important}
.players-summary{display:flex;align-items:center;gap:14px;margin-bottom:12px;font-size:13px;color:var(--muted)}
.paid-count{font-weight:700;color:var(--amber)}

/* 3rd-place qualifier selector */
.third-sel-card{padding:16px}
.third-sel-hdr{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;margin-bottom:8px}
.third-count{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--panel2);color:var(--muted)}
.third-count.ok{background:rgba(51,192,107,.18);color:var(--grass)}
.third-count.over{background:rgba(239,91,91,.18);color:var(--red)}
.third-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.third-chip{border:1.5px solid var(--line);border-radius:10px;padding:10px 10px 8px;cursor:pointer;transition:.15s;user-select:none;background:var(--panel2)}
.third-chip:active{transform:scale(.97)}
.third-chip.on{border-color:var(--grass);background:rgba(51,192,107,.12)}
.third-chip.no-data{opacity:.55}
.third-chip-grp{font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.1em;margin-bottom:3px}
.third-chip-team{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.third-chip-pts{font-size:10px;color:var(--muted)}
.third-chip.on .third-chip-grp{color:var(--grass)}

/* Leaderboard table */
.lb-table-wrap{overflow-x:auto}
.lb-table{width:100%;border-collapse:collapse;font-size:13px}
.lb-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:11px;color:var(--muted);font-weight:600}
.lb-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.lb-table tr:last-child td{border-bottom:none}

/* Misc */
.empty{padding:34px 18px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--grass);color:#06140b;font-weight:700;font-size:13px;
  padding:11px 18px;border-radius:30px;opacity:0;transition:.25s;z-index:40;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%)}
.toast.bad{background:var(--red);color:#fff}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #ffffff55;
  border-top-color:#06140b;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
footer{text-align:center;color:var(--muted);font-size:11px;padding:24px 0;line-height:1.6}
</style>
</head>
